<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Contact</title>
  </head>
  <body>
    <div class="container">
      <div class="contact">
        <h2 class="sectionTitle">Contact <span>Us</span></h2>
        <form action="">
          <div class="formGroup">
            <div class="formGroupTitle">
              <label for="name">Name</label>
              <label for="email">Email</label>
            </div>
            <div class="formGroupInput">
              <input
                type="text"
                id="name"
                name="name"
                placeholder="Your Name"
                required
              />
              <input
                type="email"
                id="email"
                name="email"
                placeholder="Your Email"
                required
              />
            </div>
          </div>
          <div class="formGroup">
            <div class="formGroupTitle">
              <label for="subject">Subject</label>
            </div>
            <div class="formGroupInput">
              <input
                type="text"
                id="subject"
                name="subject"
                placeholder="Subject"
                required
              />
            </div>
          </div>
          <div class="formGroup">
            <div class="formGroupTitle">
              <label for="message">Message</label>
            </div>
            <div class="formGroupInput">
              <textarea
                id="message"
                name="message"
                placeholder="Your Message"
                required
              ></textarea>
            </div>
          </div>
          <button type="submit" class="contact-btn btn">Send Message</button>
        </form>
      </div>
    </div>
  </body>
</html>
