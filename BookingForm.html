<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Booking Form</title>
  </head>
  <body>
    <div class="container">
      <section class="bookingForm">
        <form action="">
          <h2 class="sectionTitle">Book <span>Your</span> Stay</h2>
          <div class="BookingContent">
            <div class="formRight">
          <div class="formGroup">
            <h2 class="formtitle">Booking Details</h2>
            <div class="bookingForm">
              <div class="formItem">
                <label>Check-in</label>
                <input type="date" id="checkin" placeholder="Select date" />
              </div>

              <div class="formItem">
                <label>Check-out</label>
                <input type="date" id="checkout" placeholder="Select date" />
              </div>

              <div class="formItem">
                <label>Guest</label>
                <input type="number" id="guest" placeholder="1" min="1" />
              </div>

            </div>
          </div>
          <div class="formGroup">
            <h2 class="formtitle">Contact Details</h2>
            <div class="bookingForm">
              <div class="formItem">
                <label>Check-in</label>
                <input type="text" id="checkin" placeholder="Select date" />
              </div>

              <div class="formItem">
                <label>Check-out</label>
                <input type="text" id="checkout" placeholder="Select date" />
              </div>

              <div class="formItem">
                <label>Guest</label>
                <input type="number" id="guest" placeholder="1" min="1" />
              </div>

            
            </div>
          </div>
          <button type="submit" class="from-btn btn">Book Now</button>
          </div>
          <div class="formLeft">
            <img src="assets/images/room1.jpg" class="formImg" alt="">
            <div class="formLeftTitle">
              <P class="form-room-Name">Delux Room</P>
              <p class="form-room-Price">$500 </p>
            </div>
            <p class="formRoomDescription">Experience luxury in our Deluxe King Room, featuring a spacious
            layout, king-sized bed, modern amenities, and a stunning city view.
            Perfect for both business and leisure travelers seeking comfort and
            style.</p>
          
          <div class="form-Feature">
            <p class="form-room-Name"> Room Feature</p>
            <div class="form-room-Amenite">
              <img src="assets/images/room-feature-icon-2.svg" alt="" />
              <img src="assets/images/room-feature-icon-3.svg" alt="" />
              <img src="assets/images/room-feature-icon-6.svg" alt="" />
              <img src="assets/images/room-feature-icon-1.svg" alt="" />
              </div>
            </div>
          </div>
          </div>
        </form>
        </div>
      </section>
    </div>
  </body>
</html>
